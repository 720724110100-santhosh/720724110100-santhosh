<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Inspired Dashboard</title>

<style>
:root{
    --bg:#0d1117;
    --surface:#161b22;
    --surface2:#21262d;
    --border:#30363d;
    --text:#e6edf3;
    --muted:#8b949e;

    --accent:#58a6ff;
    --green:#3fb950;
    --orange:#f39c12;
    --purple:#bc8cff;
    --pink:#ff7eb6;

    --shadow:0 10px 30px rgba(0,0,0,.25);
}

.light{
    --bg:#f6f8fa;
    --surface:#ffffff;
    --surface2:#f3f4f6;
    --border:#d0d7de;
    --text:#24292f;
    --muted:#57606a;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Inter,Segoe UI,sans-serif;
    background:var(--bg);
    color:var(--text);
    transition:.35s ease;
    overflow-x:hidden;
}

/* HEADER */

header{
    height:70px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    background:var(--surface);
    border-bottom:1px solid var(--border);
    position:sticky;
    top:0;
    z-index:100;
}

.logo-area{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo{
    font-size:2rem;
}

.logo-text{
    font-weight:700;
    font-size:1.2rem;
}

.search-box{
    flex:1;
    max-width:500px;
    margin:0 20px;
}

.search-box input{
    width:100%;
    padding:12px 16px;
    border:none;
    border-radius:12px;
    background:var(--surface2);
    color:var(--text);
    outline:none;
}

.header-right{
    display:flex;
    align-items:center;
    gap:15px;
}

.toggle-btn{
    cursor:pointer;
    border:none;
    background:var(--surface2);
    color:var(--text);
    padding:10px;
    border-radius:10px;
    transition:.3s;
}

.toggle-btn:hover{
    transform:rotate(20deg);
}

.profile{
    position:relative;
}

.avatar{
    width:42px;
    height:42px;
    border-radius:50%;
    cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--purple));
}

.dropdown{
    position:absolute;
    right:0;
    top:55px;
    width:200px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    display:none;
    overflow:hidden;
    box-shadow:var(--shadow);
}

.dropdown a{
    display:block;
    padding:12px;
    text-decoration:none;
    color:var(--text);
}

.dropdown a:hover{
    background:var(--surface2);
}

.dropdown.show{
    display:block;
}

/* LAYOUT */

.container{
    display:flex;
    min-height:calc(100vh - 70px);
}

aside{
    width:250px;
    background:var(--surface);
    border-right:1px solid var(--border);
    transition:.3s;
}

aside.collapsed{
    width:75px;
}

.sidebar-header{
    padding:18px;
}

.sidebar-toggle{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:var(--surface2);
    color:var(--text);
    cursor:pointer;
}

.nav-links{
    list-style:none;
}

.nav-links li{
    margin:8px;
}

.nav-links a{
    text-decoration:none;
    color:var(--text);
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px;
    border-radius:10px;
    transition:.3s;
}

.nav-links a:hover{
    background:var(--surface2);
    transform:translateX(4px);
}

main{
    flex:1;
    padding:25px;
}

/* FILTERS */

.controls{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    margin-bottom:25px;
}

.controls select{
    padding:10px 14px;
    border-radius:10px;
    border:none;
    background:var(--surface2);
    color:var(--text);
}

/* STATUS */

.loading,
.error{
    text-align:center;
    padding:40px;
    font-size:1.1rem;
}

.loader{
    width:45px;
    height:45px;
    border:4px solid rgba(255,255,255,.15);
    border-top:4px solid var(--accent);
    border-radius:50%;
    margin:auto;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{transform:rotate(360deg)}
}

/* REPOS */

.repo-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:20px;
}

.repo-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:18px;
    padding:20px;
    transition:.3s ease;
    animation:fadeUp .4s ease;
}

.repo-card:hover{
    transform:translateY(-6px);
    box-shadow:var(--shadow);
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(15px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.repo-title{
    text-decoration:none;
    font-size:1.2rem;
    font-weight:700;
    color:var(--accent);
}

.repo-title:hover{
    color:var(--pink);
}

.repo-desc{
    margin:12px 0;
    color:var(--muted);
    line-height:1.5;
}

.repo-footer{
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
    margin-top:15px;
}

.badge{
    padding:6px 12px;
    border-radius:20px;
    font-size:.8rem;
    font-weight:600;
}

.js{
    background:rgba(243,156,18,.15);
    color:var(--orange);
}

.python{
    background:rgba(63,185,80,.15);
    color:var(--green);
}

.css{
    background:rgba(188,140,255,.15);
    color:var(--purple);
}

.stats{
    display:flex;
    gap:12px;
    color:var(--muted);
    font-size:.9rem;
}

.auth-box{
    margin-bottom:25px;
    padding:20px;
    border-radius:15px;
    background:var(--surface);
    border:1px solid var(--border);
}

.auth-box button{
    margin-top:10px;
    padding:10px 18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--purple));
    color:white;
}

@media(max-width:900px){

    aside{
        position:fixed;
        z-index:99;
        height:100%;
        left:-250px;
    }

    aside.mobile-open{
        left:0;
    }

    .search-box{
        display:none;
    }

    .repo-grid{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>

<header>

    <div class="logo-area">
        <div class="logo">🐙</div>
        <div class="logo-text">GitHub Dashboard</div>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput"
               placeholder="Search repositories...">
    </div>

    <div class="header-right">

        <button class="toggle-btn" id="menuBtn">
            ☰
        </button>

        <button class="toggle-btn" id="themeToggle">
            🌙
        </button>

        <div class="profile">
            <div class="avatar" id="avatar"></div>

            <div class="dropdown" id="dropdown">
                <a href="#">Your Profile</a>
                <a href="#">Notifications</a>
                <a href="#">Settings</a>
                <a href="#">Sign Out</a>
            </div>
        </div>

    </div>

</header>

<div class="container">

    <aside id="sidebar">

        <div class="sidebar-header">
            <button class="sidebar-toggle" id="collapseBtn">
                Collapse
            </button>
        </div>

        <ul class="nav-links">
            <li><a href="#">🏠 Home</a></li>
            <li><a href="#">📦 Repositories</a></li>
            <li><a href="#">🐞 Issues</a></li>
            <li><a href="#">🔀 Pull Requests</a></li>
            <li><a href="#">⚙ Settings</a></li>
        </ul>

    </aside>

    <main>

        <section class="auth-box">
            <h2>User Authentication</h2>
            <p>Placeholder authentication interface.</p>
            <button>Sign In with GitHub</button>
        </section>

        <section class="controls">

            <select id="languageFilter">
                <option value="">All Languages</option>
            </select>

            <select id="sortOption">
                <option value="stars">Sort by Stars</option>
                <option value="updated">Sort by Updated</option>
            </select>

        </section>

        <div id="status"></div>

        <section class="repo-grid" id="repoContainer"></section>

    </main>

</div>

<script>
/**************************************************
 * GitHub Inspired Dashboard
 * Modular JavaScript
 **************************************************/

const state = {
    repositories: [],
    filtered: []
};

const repoContainer = document.getElementById("repoContainer");
const statusEl = document.getElementById("status");

/**************************************************
 * Mock Repository Data
 **************************************************/

async function fetchRepositories(){

    showLoading();

    try{

        await new Promise(r=>setTimeout(r,1200));

        const repos = [
            {
                name:"NeonUI",
                description:"Modern UI component library.",
                stars:5842,
                forks:763,
                language:"JavaScript",
                updated:"2026-05-15",
                url:"#"
            },
            {
                name:"PyVision",
                description:"Computer vision toolkit.",
                stars:9320,
                forks:1400,
                language:"Python",
                updated:"2026-06-10",
                url:"#"
            },
            {
                name:"CSSGalaxy",
                description:"Creative CSS animations.",
                stars:3800,
                forks:620,
                language:"CSS",
                updated:"2026-06-18",
                url:"#"
            },
            {
                name:"NodeStorm",
                description:"Backend starter framework.",
                stars:7200,
                forks:990,
                language:"JavaScript",
                updated:"2026-06-20",
                url:"#"
            }
        ];

        state.repositories = repos;
        state.filtered = [...repos];

        populateLanguages();
        renderRepos();

    }catch(error){

        showError(
          "Unable to fetch repositories."
        );

        console.error(error);
    }
}

/**************************************************
 * Rendering
 **************************************************/

function renderRepos(){

    repoContainer.innerHTML = "";

    if(state.filtered.length === 0){
        repoContainer.innerHTML =
        "<h3>No repositories found.</h3>";
        return;
    }

    state.filtered.forEach(repo=>{

        const card = document.createElement("article");

        card.className = "repo-card";

        const languageClass =
            repo.language.toLowerCase();

        card.innerHTML = `
            <a href="${repo.url}"
               class="repo-title">
               ${repo.name}
            </a>

            <p class="repo-desc">
               ${repo.description}
            </p>

            <div class="repo-footer">

                <span class="badge ${languageClass}">
                    ${repo.language}
                </span>

                <div class="stats">
                    <span>⭐ ${repo.stars}</span>
                    <span>🍴 ${repo.forks}</span>
                </div>

            </div>

            <small style="color:var(--muted)">
                Updated ${repo.updated}
            </small>
        `;

        repoContainer.appendChild(card);
    });

    statusEl.innerHTML = "";
}

/**************************************************
 * Filtering
 **************************************************/

function applyFilters(){

    const search =
        document.getElementById(
            "searchInput"
        ).value.toLowerCase();

    const language =
        document.getElementById(
            "languageFilter"
        ).value;

    const sort =
        document.getElementById(
            "sortOption"
        ).value;

    state.filtered =
    state.repositories.filter(repo=>{

        const matchSearch =
        repo.name.toLowerCase()
        .includes(search);

        const matchLanguage =
        !language ||
        repo.language === language;

        return matchSearch &&
               matchLanguage;
    });

    if(sort==="stars"){
        state.filtered.sort(
            (a,b)=>b.stars-a.stars
        );
    }else{
        state.filtered.sort(
            (a,b)=>
            new Date(b.updated) -
            new Date(a.updated)
        );
    }

    renderRepos();
}

/**************************************************
 * UI States
 **************************************************/

function showLoading(){
    statusEl.innerHTML = `
        <div class="loading">
            <div class="loader"></div>
            <p>Loading repositories...</p>
        </div>
    `;
}

function showError(message){
    statusEl.innerHTML =
    `<div class="error">${message}</div>`;
}

/**************************************************
 * Populate Languages
 **************************************************/

function populateLanguages(){

    const select =
    document.getElementById(
        "languageFilter"
    );

    const languages =
    [...new Set(
        state.repositories
        .map(r=>r.language)
    )];

    languages.forEach(lang=>{

        const option =
        document.createElement("option");

        option.value = lang;
        option.textContent = lang;

        select.appendChild(option);
    });
}

/**************************************************
 * Theme
 **************************************************/

document
.getElementById("themeToggle")
.addEventListener("click",()=>{

    document.body
    .classList.toggle("light");
});

/**************************************************
 * Sidebar
 **************************************************/

document
.getElementById("collapseBtn")
.addEventListener("click",()=>{

    document
    .getElementById("sidebar")
    .classList.toggle("collapsed");
});

document
.getElementById("menuBtn")
.addEventListener("click",()=>{

    document
    .getElementById("sidebar")
    .classList.toggle("mobile-open");
});

/**************************************************
 * Profile Dropdown
 **************************************************/

document
.getElementById("avatar")
.addEventListener("click",()=>{

    document
    .getElementById("dropdown")
    .classList.toggle("show");
});

/**************************************************
 * Event Listeners
 **************************************************/

document
.getElementById("searchInput")
.addEventListener("input",
applyFilters);

document
.getElementById("languageFilter")
.addEventListener("change",
applyFilters);

document
.getElementById("sortOption")
.addEventListener("change",
applyFilters);

/**************************************************
 * Start App
 **************************************************/

fetchRepositories();

</script>

</body>
</html>
